<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="語音日記">
<title>語音日記助手</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg-secondary: #f5f4f0; --bg-tertiary: #eeede8;
    --text: #1a1a18; --text-secondary: #5f5e5a; --text-tertiary: #888780;
    --border: rgba(0,0,0,0.12); --border-md: rgba(0,0,0,0.22);
    --radius-md: 8px; --radius-lg: 12px;
    --success: #0F6E56; --danger-color: #A32D2D; --danger-bg: #FAECE7;
    --recording-color: #D85A30;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg-secondary: #242422; --bg-tertiary: #2c2c2a;
      --text: #f0efe9; --text-secondary: #b4b2a9; --text-tertiary: #888780;
      --border: rgba(255,255,255,0.1); --border-md: rgba(255,255,255,0.2);
      --success: #5DCAA5; --danger-color: #f09595; --danger-bg: #2a1a16;
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: var(--bg-tertiary); color: var(--text);
    min-height: 100vh; display: flex; align-items: flex-start; justify-content: center;
    padding: max(env(safe-area-inset-top), 1.5rem) 1rem max(env(safe-area-inset-bottom), 1.5rem);
  }
  .container { width: 100%; max-width: 560px; padding-bottom: 2rem; }
  .app-title { font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px; }
  .app-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-tertiary); }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 8px; }
  input[type="text"], input[type="password"], textarea {
    width: 100%; background: var(--bg-secondary); border: 0.5px solid var(--border);
    border-radius: var(--radius-md); color: var(--text); font-family: inherit;
    font-size: 14px; line-height: 1.6; outline: none; -webkit-appearance: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, input[type="password"]:focus, textarea:focus { border-color: var(--border-md); }
  input[type="text"], input[type="password"] { height: 38px; padding: 0 12px; }
  textarea { padding: 10px 12px; resize: vertical; min-height: 110px; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 0 14px; height: 38px;
    border-radius: var(--radius-md); border: 0.5px solid var(--border-md);
    background: transparent; color: var(--text); font-size: 13px; font-family: inherit;
    cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent;
    transition: background 0.12s, opacity 0.12s;
  }
  .btn:hover, .btn:active { background: var(--bg-secondary); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn-primary:hover, .btn-primary:active { opacity: 0.85; background: var(--text); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-full { width: 100%; justify-content: center; height: 44px; font-size: 14px; }
  .api-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .api-row input { flex: 1; min-width: 200px; }
  .hint { font-size: 12px; color: var(--text-tertiary); margin-top: 6px; line-height: 1.5; }
  .hint a { color: var(--text-secondary); }

  /* API provider badge */
  #key-status { font-size: 12px; color: var(--text-tertiary); margin-top: 6px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  #key-status.ok { color: var(--success); }
  .provider-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500;
    border: 0.5px solid var(--border-md); color: var(--text-secondary);
    background: var(--bg-secondary);
  }
  .provider-badge.gemini { border-color: #4285F4; color: #4285F4; background: rgba(66,133,244,0.08); }
  .provider-badge.openai { border-color: #10a37f; color: #10a37f; background: rgba(16,163,127,0.08); }
  .provider-badge.groq { border-color: #f55036; color: #f55036; background: rgba(245,80,54,0.08); }
  .provider-badge.anthropic { border-color: #d1b490; color: #a3815b; background: rgba(209,180,144,0.15); }

  .provider-links { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
  .provider-link-item { font-size: 12px; color: var(--text-tertiary); }
  .provider-link-item a { color: var(--text-secondary); }

  /* Saved keys list */
  #saved-keys-section { margin-bottom: 14px; display: none; }
  #saved-keys-section .section-label { margin-bottom: 6px; }
  .key-list { display: flex; flex-direction: column; gap: 6px; }
  .key-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border); background: var(--bg-secondary);
    cursor: pointer; transition: border-color 0.12s;
  }
  .key-item:hover { border-color: var(--border-md); }
  .key-item.active { border-color: var(--border-md); background: var(--bg-tertiary); }
  .key-item-info { flex: 1; min-width: 0; }
  .key-item-name { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .key-item-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
  .key-item-badge { flex-shrink: 0; }
  .key-item-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .icon-btn {
    width: 28px; height: 28px; border-radius: 6px; border: none;
    background: transparent; color: var(--text-tertiary); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
    -webkit-tap-highlight-color: transparent; transition: background 0.1s, color 0.1s;
  }
  .icon-btn:hover { background: var(--bg-tertiary); color: var(--text); }
  .icon-btn.danger:hover { color: var(--danger-color); }
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 12px 0; }
  .new-key-label { font-size: 12px; color: var(--text-tertiary); margin-bottom: 6px; }

  .radio-group { display: flex; flex-direction: column; gap: 10px; }
  .radio-label { display: flex; align-items: flex-start; gap: 8px; font-size: 14px; cursor: pointer; line-height: 1.4; }
  .radio-label input { margin-top: 3px; flex-shrink: 0; accent-color: var(--text); }
  .radio-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }

  #stt-gemini-option { transition: opacity 0.2s; }
  #stt-gemini-option.disabled { opacity: 0.4; pointer-events: none; }
  #stt-gemini-note { font-size: 12px; color: var(--text-tertiary); margin-top: 8px; display: none; }
  #stt-gemini-note.show { display: block; }

  /* Group Tabs */
  .group-tabs { display: flex; gap: 8px; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
  .group-tabs::-webkit-scrollbar { display: none; }
  .group-tab { font-size: 14px; font-weight: 500; color: var(--text-tertiary); cursor: pointer; padding: 4px 8px; border-radius: var(--radius-md); transition: color 0.15s, background 0.15s; }
  .group-tab:hover { color: var(--text-secondary); background: var(--bg-secondary); }
  .group-tab.active { color: var(--text); background: var(--bg-secondary); }

  .style-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--border-md);
    font-size: 13px; cursor: pointer; background: transparent; color: var(--text-secondary);
    font-family: inherit; -webkit-tap-highlight-color: transparent; transition: all 0.1s;
  }
  .pill.selected { background: var(--text); color: var(--bg); border-color: var(--text); }
  
  #style-desc { font-size: 12px; color: var(--text-tertiary); margin-top: 10px; font-style: italic; display: flex; align-items: center; gap: 6px; line-height: 1.4; }
  #style-desc::before { content: ''; display: inline-block; width: 4px; height: 4px; border-radius: 50%; background: var(--text-tertiary); flex-shrink: 0; }

  #custom-style-box { margin-top: 10px; display: none; }
  #custom-style-box textarea { min-height: 90px; font-size: 13px; }
  
  .record-area { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
  #record-btn {
    width: 68px; height: 68px; border-radius: 50%; border: 1.5px solid var(--border-md);
    background: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 26px; color: var(--text); flex-shrink: 0; -webkit-tap-highlight-color: transparent; transition: all 0.15s;
  }
  #record-btn.recording { border-color: var(--recording-color); background: var(--danger-bg); color: var(--recording-color); animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(216,90,48,0.2); } 50% { box-shadow: 0 0 0 8px rgba(216,90,48,0); } }
  .record-info { flex: 1; min-width: 0; }
  .status-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-tertiary); flex-shrink: 0; }
  .status-dot.active { background: var(--success); }
  .status-dot.error { background: var(--danger-color); }
  #status-msg { font-size: 13px; color: var(--text-secondary); }
  #timer { font-size: 13px; color: var(--text-tertiary); font-variant-numeric: tabular-nums; }
  #waveform { height: 28px; display: flex; align-items: center; gap: 2px; }
  .wave-bar { width: 3px; border-radius: 2px; background: var(--text-tertiary); height: 4px; transition: height 0.08s; }
  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .spacer { flex: 1; }
  .output-wrap { position: relative; }
  #copy-toast { position: absolute; bottom: 10px; right: 10px; background: var(--text); color: var(--bg); font-size: 12px; padding: 4px 10px; border-radius: var(--radius-md); opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  #copy-toast.show { opacity: 1; }
  #diary-text { min-height: 180px; }
  .settings-link { font-size: 12px; color: var(--text-tertiary); cursor: pointer; display: inline-flex; align-items: center; gap: 4px; background: none; border: none; font-family: inherit; padding: 0; -webkit-tap-highlight-color: transparent; }
  .settings-link:hover { color: var(--text-secondary); }
  .install-banner { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 0.9rem 1.25rem; margin-bottom: 1rem; font-size: 13px; color: var(--text-secondary); line-height: 1.5; display: none; }
  @media (max-width: 480px) { body { padding-left: 0.75rem; padding-right: 0.75rem; } }
</style>
</head>
<body>
<div class="container">
  <div class="app-title"><div class="dot"></div>語音日記助手</div>

  <div class="install-banner" id="install-banner">
    📱 想加到手機主畫面當 App？Safari 點下方「分享」→「加入主畫面」即可。
  </div>

  <div id="setup-screen">
    <div class="card">
      <div class="section-label">AI API Key</div>

      <div id="saved-keys-section">
        <div class="key-list" id="key-list"></div>
        <hr class="divider">
        <div class="new-key-label">新增 Key</div>
      </div>

      <div style="margin-bottom:6px">
        <input type="text" id="api-key-name" placeholder="幫這組 Key 取個名字（選填）" autocomplete="off" style="font-size:13px;">
      </div>
      <div class="api-row">
        <input type="password" id="api-key-input" placeholder="貼上 API Key (支援 Gemini, OpenAI, Groq)..." autocomplete="off" oninput="onKeyInput()">
        <button class="btn btn-primary" onclick="saveKey()"><i class="ti ti-check"></i>儲存</button>
      </div>
      <div id="key-status">尚未設定</div>
      <div class="provider-links">
        <div class="provider-link-item">Groq (推薦/免費)：<a href="https://console.groq.com/keys" target="_blank">申請 Key ↗</a></div>
        <div class="provider-link-item">Gemini (免費)：<a href="https://aistudio.google.com/apikey" target="_blank">申請 Key ↗</a></div>
        <div class="provider-link-item">OpenAI：<a href="https://platform.openai.com/api-keys" target="_blank">申請 Key ↗</a></div>
      </div>
      <div style="margin-top:10px">
        <button class="btn" style="color:var(--danger-color);border-color:rgba(163,45,45,0.3);font-size:12px;height:32px;" onclick="clearAllKeys()">
          <i class="ti ti-trash"></i>清除所有已儲存的 Key
        </button>
      </div>
    </div>

    <div class="card">
      <div class="section-label">語音辨識方式</div>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="stt-mode" value="browser" checked>
          <div>
            <div>瀏覽器內建辨識（免費 / 推薦）</div>
            <div class="radio-sub">不消耗 token。支援中英混合，需用 Chrome 或 Safari。</div>
          </div>
        </label>
        <label class="radio-label" id="stt-gemini-option">
          <input type="radio" name="stt-mode" value="gemini" id="stt-gemini-radio">
          <div>
            <div>Gemini 語音辨識（較準確 / 耗 Token）</div>
            <div class="radio-sub">辨識品質更好，中英混合更自然。會將音訊上傳，消耗較多 token。僅限 Gemini Key。</div>
          </div>
        </label>
      </div>
      <div id="stt-gemini-note">⚠️ Gemini 語音辨識僅支援 Gemini Key。使用其他 Key 時請選瀏覽器內建辨識。</div>
    </div>
    <button class="btn btn-primary btn-full" onclick="startApp()"><i class="ti ti-arrow-right"></i>開始使用</button>
  </div>

  <div id="main-screen" style="display:none">
    <div class="card">
      <div class="section-label" style="margin-bottom:4px">寫作風格</div>
      
      <div class="group-tabs" id="group-tabs">
        <div class="group-tab active" data-group="diary">日記本</div>
        <div class="group-tab" data-group="social">社群貼文</div>
        <div class="group-tab" data-group="custom">自訂風格</div>
      </div>

      <div class="style-pills" id="style-pills-container">
        </div>
      
      <div id="style-desc"></div>

      <div id="custom-style-box">
        <textarea id="custom-style-text" placeholder="貼上你喜歡的文字段落讓 AI 模仿風格，或直接寫你的額外要求。&#10;&#10;建議 100 字以上風格模仿效果更好。"></textarea>
        <div class="hint">AI 只會模仿風格和語感，不會抄內容。</div>
      </div>
    </div>

    <div class="card">
      <div class="record-area">
        <button id="record-btn" onclick="toggleRecord()" aria-label="開始錄音">
          <i class="ti ti-microphone" id="record-icon"></i>
        </button>
        <div class="record-info">
          <div class="status-row">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-msg">按下麥克風開始說話</span>
            <span id="timer" style="display:none">0:00</span>
          </div>
          <div id="waveform"></div>
        </div>
      </div>
      <div class="section-label" style="margin-bottom:6px">語音辨識文字</div>
      <textarea id="raw-text" placeholder="語音辨識後的文字會出現在這裡，你也可以直接貼上或手動修改..."></textarea>
      <div class="row" style="margin-top:10px">
        <button class="btn" onclick="document.getElementById('raw-text').value=''"><i class="ti ti-trash"></i>清除</button>
        <div class="spacer"></div>
        <button class="btn btn-primary" onclick="rewrite()" id="rewrite-btn"><i class="ti ti-sparkles"></i>AI 潤飾文字</button>
      </div>
    </div>

    <div class="card output-wrap">
      <div class="section-label" style="margin-bottom:6px">潤飾後的結果</div>
      <textarea id="diary-text" placeholder="AI 潤飾後的文字會出現在這裡..."></textarea>
      <div class="row" style="margin-top:10px">
        <button class="btn btn-primary" onclick="copyDiary()"><i class="ti ti-copy"></i>複製到剪貼簿</button>
        <div class="spacer"></div>
        <button class="settings-link" onclick="showSetup()"><i class="ti ti-settings"></i>設定</button>
      </div>
      <div id="copy-toast">已複製！</div>
    </div>
  </div>
</div>

<script>
let apiKey = '';
let sttMode = localStorage.getItem('diary_stt_mode') || 'browser';

// --- 新版風格架構 ---
const styleConfig = {
  diary: [
    { id: 'narrative', label: '場景敘事感', prompt: '帶有微小說敘事感，注重時序與畫面場景的描寫。語句要像現代人在說一個流暢的故事，自然且平易近人，絕不要矯情造作。', desc: '適合記錄事件，帶有現代場景與故事流動感。' },
    { id: 'literary', label: '微文青散文', prompt: '現代都會散文風格。著重於五感與心理狀態的細膩描寫。請注意：必須使用現代白話文與日常詞彙，絕對禁止使用文言文、成語堆疊或古代文學字眼（如：餐罷、滂沱、抑或等）。語氣要是現代人的呢喃。', desc: '著重內心感受描寫，用字優美現代，絕對不含文言文。' },
    { id: 'casual', label: '輕鬆流水帳', prompt: '輕鬆自然的流水帳，口語化但排版整齊，就像是用文字訊息跟好朋友交代今天發生了什麼事。', desc: '像跟好朋友聊天，輕鬆整齊的記事。' },
    { id: 'emotional', label: '情緒日記', prompt: '以情緒抒發為中心，誠實且直接地表達當下的感受、脆弱或喜悅。不過度修飾，是很真實、無包袱的自我對話。', desc: '保留真實情緒起伏，適合純粹的自我對話。' },
    { id: 'original', label: '原味輸出', prompt: '最小幅度整理。只幫忙修掉口語贅字（如：那個、然後）、補齊斷掉的邏輯，但絕對不改變說話者原本的用詞習慣、語感與語氣。', desc: '幫你挑錯字、順邏輯，保留你最原始的說話語氣。' }
  ],
  social: [
    { id: 'threads', label: 'Threads 碎碎念', prompt: '台灣 Threads（脆）常見的發文風格。主打「抒發情緒、真實碎碎念、愈廢愈好」。語氣極度口語、隨性，帶有一點自嘲或幽默感，像是把腦袋裡的聲音直接打出來。句子簡短，節奏快，容易讓年輕網友產生共鳴。', desc: '極度口語的隨性碎碎念，節奏快，適合脆 (Threads)。' },
    { id: 'ig', label: 'IG 生活氛圍', prompt: '台灣 Instagram 常見的生活風格貼文（Lifestyle）。文字帶有現代氛圍感，適合搭配照片閱讀。語氣輕鬆但不隨便，專注於當下生活的美好微小細節或精緻感。', desc: '強調生活氛圍與現代感，句子稍微精簡，適合配圖閱讀。' },
    { id: 'emo', label: '深夜 EMO 貼文', prompt: '適合深夜發布在社群的感性文字。帶有現代人的反思、微小的無奈或孤獨感。用語深刻但不矯情做作，必須是日常白話文。', desc: '帶有反思與微小的孤獨感，適合深夜抒發。' }
  ],
  custom: [
    { id: 'custom', label: '我的風格', prompt: '', desc: '在下方貼上你喜歡的文字，讓 AI 模仿該風格。' }
  ]
};

let currentGroup = 'diary';
let currentStyleObj = styleConfig.diary[0]; 

function initStyles() {
  const tabs = document.querySelectorAll('.group-tab');
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentGroup = tab.dataset.group;
      renderStylePills();
    });
  });
  renderStylePills();
}

function renderStylePills() {
  const container = document.getElementById('style-pills-container');
  container.innerHTML = '';
  const styles = styleConfig[currentGroup];
  
  // 預設選取該群組的第一個
  currentStyleObj = styles[0];

  styles.forEach((style, index) => {
    const btn = document.createElement('button');
    btn.className = 'pill' + (index === 0 ? ' selected' : '');
    btn.textContent = style.label;
    btn.onclick = () => {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('selected'));
      btn.classList.add('selected');
      currentStyleObj = style;
      updateStyleDesc();
    };
    container.appendChild(btn);
  });
  updateStyleDesc();
}

function updateStyleDesc() {
  document.getElementById('style-desc').textContent = currentStyleObj.desc;
  document.getElementById('custom-style-box').style.display = currentStyleObj.id === 'custom' ? 'block' : 'none';
}

// --- 以下為原有錄音與 API 邏輯 ---
let recognition = null;
let isRecording = false;
let timerInterval = null;
let timerSec = 0;
let mediaRecorder = null;
let audioChunks = [];
let waveInterval = null;
let waveBars = [];
const WAVE_COUNT = 18;

const GLOBAL_FORMAT_RULE = '格式要求：不使用任何標點符號（包括逗號、句號、頓號、問號、感嘆號等），句子之間用換行分隔，段落之間空一行，符合現代社群不愛用標點的排版方式。';

function loadKeyStore() { try { return JSON.parse(localStorage.getItem('diary_key_store') || 'null'); } catch { return null; } }
function saveKeyStore(store) { localStorage.setItem('diary_key_store', JSON.stringify(store)); }
function migrateOldKey() {
  const old = localStorage.getItem('diary_api_key');
  if (!old) return;
  const store = loadKeyStore();
  if (!store) {
    const provider = detectProvider(old);
    const id = Date.now().toString();
    saveKeyStore({ keys: [{ id, label: defaultLabel(old, provider), key: old, provider }], activeId: id });
  }
  localStorage.removeItem('diary_api_key');
}
function defaultLabel(key, provider) {
  const prefix = provider === 'gemini' ? 'Gemini' : provider === 'openai' ? 'OpenAI' : provider === 'groq' ? 'Groq' : provider === 'anthropic' ? 'Claude' : 'Key';
  return `${prefix} ···${key.slice(-4)}`;
}
function detectProvider(key) {
  if (!key) return null;
  if (key.startsWith('AIza')) return 'gemini';
  if (key.startsWith('sk-ant-')) return 'anthropic';
  if (key.startsWith('sk-')) return 'openai';
  if (key.startsWith('gsk_')) return 'groq';
  return 'unknown';
}
function providerBadgeHTML(provider) {
  const labels = { gemini: 'Gemini', openai: 'OpenAI', groq: 'Groq', anthropic: 'Anthropic', unknown: '未知' };
  const cls = provider === 'unknown' ? '' : provider;
  return `<span class="provider-badge ${cls}">${labels[provider] || '?'}</span>`;
}
function renderKeyList() {
  const store = loadKeyStore();
  const section = document.getElementById('saved-keys-section');
  const list = document.getElementById('key-list');
  if (!store || store.keys.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block'; list.innerHTML = '';
  store.keys.forEach(entry => {
    const isActive = entry.id === store.activeId;
    const div = document.createElement('div');
    div.className = 'key-item' + (isActive ? ' active' : '');
    div.innerHTML = `
      <div class="key-item-info" onclick="selectKey('${entry.id}')">
        <div class="key-item-name">${entry.label}</div>
        <div class="key-item-meta">${isActive ? '✓ 目前使用中' : '點擊切換'}</div>
      </div>
      <div class="key-item-badge">${providerBadgeHTML(entry.provider)}</div>
      <div class="key-item-actions">
        <button class="icon-btn danger" title="刪除" onclick="deleteKey('${entry.id}')"><i class="ti ti-trash"></i></button>
      </div>`;
    list.appendChild(div);
  });
}
function selectKey(id) {
  const store = loadKeyStore();
  if (!store) return;
  store.activeId = id; saveKeyStore(store);
  const entry = store.keys.find(k => k.id === id);
  if (entry) { apiKey = entry.key; updateSttOptions(entry.provider); }
  renderKeyList(); updateActiveKeyStatus();
}
function deleteKey(id) {
  const store = loadKeyStore();
  if (!store) return;
  store.keys = store.keys.filter(k => k.id !== id);
  if (store.activeId === id) { store.activeId = store.keys[0]?.id || null; apiKey = store.keys[0]?.key || ''; }
  saveKeyStore(store); renderKeyList(); updateActiveKeyStatus();
}
function updateActiveKeyStatus() {
  const store = loadKeyStore();
  const el = document.getElementById('key-status');
  if (!store || !store.activeId) { el.className = ''; el.innerHTML = '尚未設定'; return; }
  const entry = store.keys.find(k => k.id === store.activeId);
  if (!entry) { el.className = ''; el.innerHTML = '尚未設定'; return; }
  el.className = 'ok';
  el.innerHTML = `✓ 使用中：${providerBadgeHTML(entry.provider)} <span style="font-size:11px;color:var(--text-tertiary)">${entry.label}</span>`;
  updateSttOptions(entry.provider);
}
function onKeyInput() {
  const k = document.getElementById('api-key-input').value.trim();
  if (!k) { updateActiveKeyStatus(); return; }
  const provider = detectProvider(k);
  const el = document.getElementById('key-status');
  el.className = ''; el.innerHTML = `偵測到：${providerBadgeHTML(provider)}`;
  updateSttOptions(provider);
}
function updateSttOptions(provider) {
  const geminiOption = document.getElementById('stt-gemini-option');
  const geminiNote = document.getElementById('stt-gemini-note');
  const geminiRadio = document.getElementById('stt-gemini-radio');
  if (provider !== 'gemini') {
    geminiOption.classList.add('disabled'); geminiNote.classList.add('show');
    if (geminiRadio.checked) document.querySelector('input[name="stt-mode"][value="browser"]').checked = true;
  } else {
    geminiOption.classList.remove('disabled'); geminiNote.classList.remove('show');
  }
}

if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent) && !window.navigator.standalone) {
  document.getElementById('install-banner').style.display = 'block';
}

migrateOldKey(); renderKeyList();
const _store = loadKeyStore();
if (_store && _store.activeId) {
  const _active = _store.keys.find(k => k.id === _store.activeId);
  if (_active) { apiKey = _active.key; }
}
updateActiveKeyStatus();
if (sttMode === 'gemini') document.querySelector('input[value="gemini"]').checked = true;
initStyles();

function saveKey() {
  const k = document.getElementById('api-key-input').value.trim();
  if (!k) return;
  const provider = detectProvider(k);
  if (provider === 'unknown') { alert('Key 格式看起來不對。\nGemini: AIza…\nOpenAI: sk-…\nGroq: gsk_…\nAnthropic: sk-ant-…'); return; }
  const store = loadKeyStore() || { keys: [], activeId: null };
  const exists = store.keys.find(entry => entry.key === k);
  if (exists) {
    store.activeId = exists.id; apiKey = exists.key;
    saveKeyStore(store); document.getElementById('api-key-input').value = '';
    renderKeyList(); updateActiveKeyStatus(); return;
  }
  const id = Date.now().toString();
  const customName = document.getElementById('api-key-name').value.trim();
  const label = customName || defaultLabel(k, provider);
  document.getElementById('api-key-name').value = '';
  store.keys.push({ id, label, key: k, provider });
  store.activeId = id; apiKey = k; saveKeyStore(store);
  document.getElementById('api-key-input').value = '';
  renderKeyList(); updateActiveKeyStatus();
}

function startApp() {
  if (!apiKey) { alert('請先貼上並儲存 API Key！'); return; }
  sttMode = document.querySelector('input[name="stt-mode"]:checked').value;
  localStorage.setItem('diary_stt_mode', sttMode);
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  initWaveform();
}

function showSetup() {
  stopRecording();
  document.getElementById('setup-screen').style.display = 'block';
  document.getElementById('main-screen').style.display = 'none';
}

function initWaveform() {
  const wv = document.getElementById('waveform');
  wv.innerHTML = ''; waveBars = [];
  for (let i = 0; i < WAVE_COUNT; i++) {
    const b = document.createElement('div'); b.className = 'wave-bar'; wv.appendChild(b); waveBars.push(b);
  }
}
function animateWave(active) {
  if (waveInterval) clearInterval(waveInterval);
  if (!active) { waveBars.forEach(b => b.style.height = '4px'); return; }
  waveInterval = setInterval(() => { waveBars.forEach(b => { b.style.height = (4 + Math.random() * 20) + 'px'; }); }, 90);
}
function updateTimer() {
  timerSec++; document.getElementById('timer').textContent = Math.floor(timerSec/60) + ':' + String(timerSec%60).padStart(2,'0');
}
function setStatus(msg, state) {
  document.getElementById('status-msg').textContent = msg;
  document.getElementById('status-dot').className = 'status-dot' + (state==='active'?' active':state==='error'?' error':'');
}

function toggleRecord() { if (isRecording) stopRecording(); else startRecording(); }
function startRecording() {
  isRecording = true; timerSec = 0;
  document.getElementById('record-btn').classList.add('recording');
  document.getElementById('record-icon').className = 'ti ti-player-stop';
  document.getElementById('timer').style.display = '';
  timerInterval = setInterval(updateTimer, 1000); animateWave(true);
  if (sttMode === 'browser') startBrowserSpeech(); else startGeminiRecord();
}
function stopRecording() {
  if (!isRecording) return;
  isRecording = false; clearInterval(timerInterval);
  document.getElementById('record-btn').classList.remove('recording');
  document.getElementById('record-icon').className = 'ti ti-microphone';
  document.getElementById('timer').style.display = 'none'; animateWave(false);
  if (sttMode === 'browser' && recognition) { try { recognition.stop(); } catch(e) {} }
  if (sttMode === 'gemini' && mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  setStatus('按下麥克風開始說話', '');
}

function startBrowserSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus('請改用 Chrome 或 Safari', 'error'); stopRecording(); return; }
  let finalText = document.getElementById('raw-text').value; let retries = 0;
  function init() {
    recognition = new SR(); recognition.lang = 'zh-TW'; recognition.continuous = true; recognition.interimResults = true;
    recognition.onstart = () => { retries = 0; setStatus('正在聆聽（中英混合皆可）...', 'active'); };
    recognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalText += e.results[i][0].transcript; else interim = e.results[i][0].transcript;
      }
      document.getElementById('raw-text').value = finalText + interim;
    };
    recognition.onerror = (e) => {
      if (e.error === 'no-speech') return;
      if ((e.error === 'network' || e.error === 'service-not-allowed') && retries < 3) {
        retries++; setStatus('重試中...', 'active'); if (isRecording) setTimeout(init, 1000); return;
      }
      setStatus('辨識出錯：' + e.error, 'error'); stopRecording();
    };
    recognition.onend = () => { if (isRecording) setTimeout(() => { try { recognition.start(); } catch(_) {} }, 200); };
    try { recognition.start(); } catch(e) { setStatus('無法啟動，請重整頁面', 'error'); stopRecording(); }
  }
  init();
}

function startGeminiRecord() {
  setStatus('準備錄音...', 'active');
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    audioChunks = []; const mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
    mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop()); setStatus('正在辨識語音...', 'active');
      await transcribeWithGemini(new Blob(audioChunks, { type: mime }), mime);
    };
    mediaRecorder.start(); setStatus('正在錄音中...', 'active');
  }).catch(err => { setStatus('無法取得麥克風：' + err.message, 'error'); stopRecording(); });
}

async function transcribeWithGemini(blob, mime) {
  try {
    const b64 = await new Promise((res, rej) => {
      const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.onerror = rej; r.readAsDataURL(blob);
    });
    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [
        { text: '請把這段音訊轉錄成文字。說話者可能中英混合，請忠實轉錄，中文用繁體，只輸出轉錄文字，不要任何說明。' },
        { inline_data: { mime_type: mime, data: b64 } }
      ]}]})
    });
    const data = await resp.json();
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
    if (text) { document.getElementById('raw-text').value += text; setStatus('辨識完成', 'active'); }
    else setStatus('辨識失敗，請重試', 'error');
  } catch(e) { setStatus('辨識出錯：' + e.message, 'error'); }
}

async function rewrite() {
  const raw = document.getElementById('raw-text').value.trim();
  if (!raw) { alert('請先輸入或錄製內容！'); return; }
  if (currentStyleObj.id === 'custom' && !document.getElementById('custom-style-text').value.trim()) {
    alert('請先在「我的風格」欄位貼上你的風格範本！'); return;
  }
  
  const btn = document.getElementById('rewrite-btn');
  btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader"></i>處理中...';
  document.getElementById('diary-text').value = '';

  let styleInstruction = currentStyleObj.id === 'custom'
    ? `模仿以下文字的風格、語氣和節奏感（只模仿風格，不要抄內容）：\n\n「${document.getElementById('custom-style-text').value.trim()}」\n\n如果上方文字中包含額外的格式或風格指示，請一併遵守。`
    : currentStyleObj.prompt;

  const prompt = `我用語音輸入了以下內容，可能有錯字、亂碼或語意不順（也可能中英混合）：

「${raw}」

請幫我完成兩件事：
1. 修正錯字和亂碼，還原我真正想表達的意思。中英夾雜是正常的，保留即可。
2. 將內容重寫成以下風格：${styleInstruction}

要求：保留原本的情節和細節，不要自行添加我沒說的內容，不要加開頭問候語或任何說明，直接輸出內文。
${GLOBAL_FORMAT_RULE}`;

  try {
    const provider = detectProvider(apiKey);
    let result = '';

    if (provider === 'gemini') {
      result = await rewriteWithGemini(prompt);
    } else if (provider === 'openai') {
      result = await rewriteWithOpenAI(prompt);
    } else if (provider === 'groq') {
      result = await rewriteWithGroq(prompt);
    } else if (provider === 'anthropic') {
      result = '（注意：Anthropic 官方不允許直接從前端瀏覽器呼叫 API，會產生 CORS 錯誤。建議改用 Groq 或 Gemini！）';
    } else {
      result = '（無法識別 API Key 格式，請到設定重新確認）';
    }
    
    document.getElementById('diary-text').value = result;
  } catch(e) {
    document.getElementById('diary-text').value = '（網路錯誤：' + e.message + '）';
  }
  btn.disabled = false; btn.innerHTML = '<i class="ti ti-sparkles"></i>AI 潤飾文字';
}

// ==========================================
// API 呼叫函數區塊（各自獨立，方便未來單獨調整）
// ==========================================

async function rewriteWithGemini(prompt) {
  const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
  });
  const data = await resp.json();
  return data?.candidates?.[0]?.content?.parts?.[0]?.text || '（出錯：' + JSON.stringify(data?.error || data) + '）';
}

async function rewriteWithOpenAI(prompt) {
  const resp = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify({
      model: 'gpt-4o-mini',
      messages: [{ role: 'user', content: prompt }],
      max_tokens: 1500,
      temperature: 0.85
    })
  });
  const data = await resp.json();
  if (data.error) return '（OpenAI API 錯誤：' + data.error.message + '）';
  return data?.choices?.[0]?.message?.content || '（回應為空）';
}

async function rewriteWithGroq(prompt) {
  const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      messages: [{ role: 'user', content: prompt }],
      max_tokens: 1500,
      temperature: 0.85
    })
  });
  const data = await resp.json();
  if (data.error) return '（Groq API 錯誤：' + data.error.message + '）';
  return data?.choices?.[0]?.message?.content || '（回應為空）';
}

function copyDiary() {
  const t = document.getElementById('diary-text').value;
  if (!t) return;
  navigator.clipboard.writeText(t).then(() => {
    const toast = document.getElementById('copy-toast');
    toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 1800);
  });
}

function clearAllKeys() {
  if (!confirm("確定要刪除所有已儲存的 API Key 嗎？")) return;
  localStorage.removeItem("diary_key_store"); localStorage.removeItem("diary_api_key"); apiKey = "";
  renderKeyList(); updateActiveKeyStatus(); document.getElementById("api-key-input").value = "";
}

if (apiKey) {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  setTimeout(initWaveform, 0);
}
